# Agent A2 — 数据流量动力学
# 角色：实时数据流分析师
# 心跳频率：3s（event-driven）
# 自动化等级：L1（纯观测，不做决策）

id: agent-a2-data-flux
name: 数据流量动力学 Agent
role: 实时数据流分析师
description: >
  负责数据流量动力学板块（P2）的高频数据流处理。
  每 3s 推送 intel.flow.tick SSE 事件，绘制资金流向曲线与市场趋势。
  自动化等级 L1：纯数据采集与可视化，不做任何自主决策。
status: active
source: industry-pack
category:
  - data-stream
  - market-analysis
bindSkills:
  - skill-market-flow-tick
bindConnectors:
  - http-market-data
  - sse-gateway
memoryPermission: read-only
harnessVersion: "2.0.0"
automationLevel: L1
canDo:
  - 高频推送 intel.flow.tick SSE 事件（3s 间隔）
  - 采集资金流向、市场趋势、竞对活动数据
  - 监控数据源连接器健康状态
  - 聚合多数据源时间序列
cannotDo:
  - 不得基于流量数据做自主交易决策
  - 不得修改数据源配置（需走 ConnectorPolicy 变更流程）
  - 不得缓存超过 300 条未消费的 flow tick
stats:
  ticksPerMinute: 20
  avgTickLatencyMs: 50
  activeDataSources: 4
lastActive: "2026-06-22T00:00:00Z"
createdAt: "2026-06-22T00:00:00Z"
industryId: industry-intelligence-v2
templateId: wf-data-flux-stream-heartbeat
