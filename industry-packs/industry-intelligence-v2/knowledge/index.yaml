# ─── 术语表 ────────────────────────────────────────────────────────

glossary:
  - term: 雷达维度
    definition: 行业战略态势的 8 个评估维度（政策敏感性、市场波动性、竞对活跃度、合规风险度、技术变革速度、供应链稳定性、消费者情绪、资本流动性）
  - term: 战术信号
    definition: 需立即关注的短期市场事件，按置信度分类为市场异常/竞对动向/合规风险
  - term: 预测路径
    definition: 沙盘推演生成的 3 条可能结果路径（PATH_A 乐观/PATH_B 基准/PATH_C 悲观），每条路径附带胜率与行动建议
  - term: 决策对齐度
    definition: Agent 实际决策与 Harness 策略期望之间的一致性度量（0-1），低于 0.7 触发进化提案
  - term: 星云图
    definition: 行业生态知识图谱的 3D 力导向可视化表示，节点=实体，边=关系
