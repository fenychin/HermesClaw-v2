name: quote-gen
version: "1.0.0"
displayName: "报价策略生成"
description: 多策略定价分析 + 正式报价单草稿 + 谈判预案
agentRole: 报价策略顾问
systemPromptRef: quotation
workflowRef: quote-gen
inputSchema:
  required: [productDetails, strategy, incoterms]
  optional: [paymentTerms]
outputContract:
  - priceRangeAdvice  # 底价/目标价/报出价三档
  - quotationDraft    # 正式报价单（Markdown 表格）
  - negotiationPlan   # 谈判让步节奏
  - riskWarnings      # 汇率/合规风险
evolution:
  autoUpgrade: true
  upgradeThreshold: 3
  memoryLayer: mid
harnessTags: [任务边界, 反馈闭环]
